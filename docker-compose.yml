services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dash
      POSTGRES_PASSWORD: dash
      POSTGRES_DB: dash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dash"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DASH_DATABASE_URL: postgresql+psycopg://dash:dash@postgres:5432/dash
      DASH_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  seed:
    build: ./backend
    command: python -m app.seed
    environment:
      DASH_DATABASE_URL: postgresql+psycopg://dash:dash@postgres:5432/dash
      DASH_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: ["seed"]

  load-real:
    build: ./backend
    command: python -m app.load_real
    environment:
      DASH_DATABASE_URL: postgresql+psycopg://dash:dash@postgres:5432/dash
      DASH_REDIS_URL: redis://redis:6379/0
    volumes:
      - loader-cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: ["real"]

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  loader-cache:
